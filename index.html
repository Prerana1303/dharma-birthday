<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Sir ❤️</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#faf7f5;
            font-family:Georgia, serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:#333;
        }

        .container{
            width:80%;
            max-width:700px;
            text-align:center;
            animation:fadeIn 2s;
        }

        h1{
            font-size:42px;
            margin-bottom:40px;
        }

        p{
            font-size:22px;
            line-height:1.8;
            margin-bottom:25px;
        }

        button{
            margin-top:40px;
            padding:15px 45px;
            border:none;
            background:#d6336c;
            color:white;
            font-size:18px;
            border-radius:50px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:scale(1.05);
            background:#b81f58;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

<div class="container">

<h1>Happy Birthday, Sir ❤️</h1>

<p>I've been thinking...</p>

<p>
What do you gift someone<br>
who has slowly become<br>
one of your favourite people?
</p>

<p>I couldn't find the answer.</p>

<p>So I made this.</p>

<button onclick="location.href='chapter1.html'">
Begin
</button>

</div>

</body>
</html>
